<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TF-Chat</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      height: 100vh; width: 100vw;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
      background: #d8d8d8;
      overflow: hidden;
    }
    body::before, body::after {
      content: "";
      position: fixed;
      top: 0; bottom: 0;
      width: 50vw;
      z-index: 0;
      pointer-events: none;
      filter: blur(20px);
    }
    body::before {
      left: 0;
      background: rgba(0,0,0,0.2);
    }
    body::after {
      right: 0;
      background: rgba(255,255,255,0.2);
    }
    #login {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 15px;
      background: #fff;
      z-index: 10;
    }
    #login input {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      width: 250px;
      font-size: 1rem;
    }
    #login button {
      padding: 10px 20px;
      background: #007aff;
      border: none;
      color: white;
      border-radius: 20px;
      font-size: 1rem;
    }
    #app {
      display: none;
      flex-direction: column;
      height: 100vh;
      z-index: 1;
    }
    #header {
      padding: 15px;
      background: #007aff;
      color: white;
      font-weight: bold;
      font-size: 1.2rem;
      text-align: center;
    }
    #contact-list {
      display: none;
      flex-direction: column;
      background: #fff;
      overflow-y: auto;
      flex: 1;
    }
    .contact-item {
      padding: 15px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
    }
    #chat {
      display: none;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      padding: 15px;
      gap: 10px;
      background: #000;
    }
    .msg {
      padding: 10px 15px;
      border-radius: 20px;
      max-width: 70%;
      color: white;
      position: relative;
      word-break: break-word;
    }
    .msg.me { align-self: flex-end; background: #007aff; }
    .msg.other { align-self: flex-start; background: #444; }
    .reply {
      font-size: 0.8rem;
      opacity: 0.7;
      margin-bottom: 3px;
    }
    #input-area {
      display: flex;
      padding: 10px;
      background: #eee;
    }
    #msg-input {
      flex: 1;
      padding: 10px 15px;
      border-radius: 20px;
      border: none;
      font-size: 1rem;
      max-width: 100%;
    }
    #send {
      width: 45px;
      height: 45px;
      background: #007aff;
      color: white;
      border: none;
      border-radius: 50%;
      margin-left: 10px;
      font-size: 1.3rem;
      transform: rotate(45deg);
    }
    #footer {
      text-align: center;
      font-size: 0.8rem;
      padding: 5px;
      color: #888;
      background: #f5f5f5;
    }
  </style>
</head>
<body>
  <div id="login">
    <input type="email" id="email" placeholder="Email">
    <button onclick="login()">Connexion</button>
  </div>
  <div id="app">
    <div id="header"></div>
    <div id="contact-list"></div>
    <div id="chat">
      <div id="messages"></div>
      <div id="input-area">
        <input type="text" id="msg-input" placeholder="Message">
        <button id="send" onclick="send()">➤</button>
      </div>
    </div>
    <div id="footer">© 2025 TF-Chat | D'H7:Tergene</div>
  </div>
  <audio id="notif-sound" src="https://notificationsounds.com/storage/sounds/file-sounds-1151-pristine.mp3"></audio>

  <script>
    const API = '/api'; // point vers la lambda
    let currentUser, isAdmin, selectedUser, replyTo = null;

    async function login() {
      const email = document.getElementById('email').value.toLowerCase();
      if (!email) return;
      currentUser = email;
      isAdmin = (email === 'tergenefocus@gmail.com');
      await fetch(`${API}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      document.getElementById('login').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      document.getElementById('header').innerText = isAdmin ? 'Discussion' : 'TF-Chat';
      if (isAdmin) fetchUsers();
      else {
        selectedUser = 'tergenefocus@gmail.com';
        document.getElementById('chat').style.display = 'flex';
        loadMessages();
      }
    }

    async function fetchUsers() {
      const res = await fetch(`${API}/users?self=${currentUser}`);
      const users = await res.json();
      const list = document.getElementById('contact-list');
      list.style.display = 'flex';
      list.innerHTML = '';
      users.forEach(u => {
        const div = document.createElement('div');
        div.className = 'contact-item';
        div.innerText = u;
        div.onclick = () => openChat(u);
        list.appendChild(div);
      });
    }

    async function openChat(user) {
      selectedUser = user;
      document.getElementById('contact-list').style.display = 'none';
      document.getElementById('chat').style.display = 'flex';
      document.getElementById('header').innerText = user;
      loadMessages();
    }

    async function loadMessages() {
      const res = await fetch(`${API}/chats/${selectedUser}`);
      const conv = await res.json();
      const container = document.getElementById('messages');
      container.innerHTML = '';
      conv.forEach(msg => {
        const div = document.createElement('div');
        div.className = 'msg ' + (msg.from === currentUser ? 'me' : 'other');
        if (msg.reply) {
          const r = document.createElement('div');
          r.className = 'reply';
          r.innerText = msg.reply;
          div.appendChild(r);
        }
        div.appendChild(document.createTextNode(msg.text));
        container.appendChild(div);
      });
      container.scrollTop = container.scrollHeight;
      document.getElementById('notif-sound').play().catch(() => {});
    }

    async function send() {
      const input = document.getElementById('msg-input');
      const text = input.value.trim();
      if (!text || !selectedUser) return;
      await fetch(`${API}/chats/${selectedUser}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ from: currentUser, text, reply: replyTo })
      });
      input.value = '';
      replyTo = null;
      loadMessages();
    }
  </script>
</body>
  </html>
