<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>TF Chat</title>
  <style>
    body { font-family: sans-serif; background: #111; color: white; margin: 0; padding: 0; }
    #chat { height: 80vh; overflow-y: scroll; padding: 1rem; border-bottom: 1px solid #444; }
    #messageInput { width: 70%; padding: 0.5rem; }
    #sendBtn { padding: 0.5rem; background: #444; color: white; border: none; }
  </style>
</head>
<body>
  <h2 style="text-align:center;">TF Chat</h2>
  <div id="chat"></div>
  <div style="padding: 1rem;">
    <input id="messageInput" placeholder="Écris ton message..." />
    <button id="sendBtn">Envoyer</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
